function initQuiz() {
    const container = document.getElementById('quiz-container');
    if (!container) return;
    container.innerHTML = '';
    
    document.getElementById('total-q').innerText = questionsData.length;
    
    questionsData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        
        let codeSnippet = '';
        if (q.code) {
            codeSnippet = `<div class="code-block">${q.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
        }
        
        let optionsHTML = '';
        q.options.forEach((opt, oIdx) => {
            optionsHTML += `<li class="option-item" onclick="checkAnswer(${index}, ${oIdx}, this)">${opt}</li>`;
        });
        
        card.innerHTML = `
            <div class="question-text">${q.id}. ${q.question}</div>
            ${codeSnippet}
            <ul class="options-list">${optionsHTML}</ul>
            <button class="hint-btn" onclick="toggleHint(this)">إظهار التلميح الهندسي المساعد 💡</button>
            <div class="hint-text">${q.hint}</div>
            <div class="explanation-text" id="exp-${index}">
                <strong>توضيح التدقيق البرمجي والرياضي الحاكم للمستند:</strong><br>${q.explanation}
            </div>
        `;
        container.appendChild(card);
    });
}

let correctScore = 0;
let wrongScore = 0;

function checkAnswer(qIdx, selectedIdx, element) {
    const q = questionsData[qIdx];
    const parent = element.parentElement;
    
    if (parent.classList.contains('answered')) return;
    parent.classList.add('answered');
    
    const items = parent.getElementsByClassName('option-item');
    
    if (selectedIdx === q.correct) {
        element.classList.add('correct');
        correctScore++;
        document.getElementById('correct-count').innerText = correctScore;
    } else {
        element.classList.add('wrong');
        items[q.correct].classList.add('correct');
        wrongScore++;
        document.getElementById('wrong-count').innerText = wrongScore;
    }
    
    document.getElementById(`exp-${qIdx}`).style.display = 'block';
}

function toggleHint(btn) {
    const hintText = btn.nextElementSibling;
    if (hintText.style.display === 'block') {
        hintText.style.display = 'none';
        btn.innerText = 'إظهار التلميح الهندسي المساعد 💡';
    } else {
        hintText.style.display = 'block';
        btn.innerText = 'إخفاء التلميح ✖';
    }
}

window.onload = initQuiz;
</script>
